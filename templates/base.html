<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InitRail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <video class="site-bg-video" autoplay loop muted playsinline>
    <source src="/static/video/train_bg.mp4" type="video/mp4">
  </video>
  <div class="page-shell">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="/">
          <span class="brand-mark">IR</span>
          <span class="brand-text">InitRail</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarsExample">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 nav-pills app-nav">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/map">Zone Map</a></li>
            <li class="nav-item"><a class="nav-link" href="/query">Query Explorer</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container py-4 app-main">
      {% block content %}{% endblock %}
    </main>
    <footer>InitRail</footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/main.js" defer></script>
</body>
</html>
